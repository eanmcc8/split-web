<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="GUST: A service worker -less web browser-in-a-browser" />
    <title>GUST Browser</title>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/iso-639-1@2.1.11/build/index.js" defer onload="window._iso639Ready=true;"
        onerror="console.warn('iso-639-1 failed to load');"></script>
    <!-- ES module stub: satisfies ECMAScript 6 Modules feature detection -->
    <style>
        :root {
            --bg0: #0d0f12;
            --bg1: #181c21;
            --bg2: #1c2026;
            --bg3: #252b33;
            --bg-elevated: #161a1f;
            --surface: rgba(255, 255, 255, .08);
            --surface2: rgba(255, 255, 255, .14);
            --bd: #4f5963;
            --bd2: #5a6370;
            --tx: #f0f4f8;
            --tx2: #b8c4d0;
            --tx3: #7d8a98;
            --ac: #9de5ff;
            --ac2: #70d4ff;
            --ok: #8aefb0;
            --warn: #f8dc75;
            --err: #ff9595;
            --radius-sm: 8px;
            --radius-md: 10px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .35);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, .45);
            --ui-lh: 1.5;
            --ui: 'Space Grotesk', 'Segoe UI', sans-serif;
            --mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        /* Icon spacing: log message icons get a small right gap */
        .log-msg i[class*="fa-"] {
            margin-right: 4px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg0);
            color: var(--tx);
            font-family: var(--ui);
            overflow: hidden
        }

        button,
        input,
        select {
            font: inherit
        }

        ::selection {
            background: rgba(141, 217, 255, .25);
            color: var(--tx)
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .titlebar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: var(--bg0);
            border-bottom: 1px solid var(--bd);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ac);
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid var(--ac);
            padding: 10px 12px;
            border-radius: 10px;
            margin-left: -3px;
            margin-right: -6px;
            height: 42px;
        }

        .brand i {
            font-size: 18px
        }

        .tab-strip-wrapper {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            position: relative;
        }

        .tab-strip-scroll-btn {
            max-width: 0;
            min-width: 0;
            width: 32px;
            height: 38px;
            background: transparent;
            border: none;
            color: var(--tx2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            z-index: 3;
            flex-shrink: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: max-width .2s ease, opacity .2s ease, color .12s;
        }

        .tab-strip-scroll-btn:hover {
            color: var(--ac);
        }

        .tab-strip-scroll-btn.visible {
            max-width: 32px;
            opacity: 1;
            pointer-events: all;
        }


        .tab-strip-wrapper::before,
        .tab-strip-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 48px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity .2s;
        }

        .tab-strip-wrapper::before {
            left: 32px;
            background: linear-gradient(to right, var(--bg0), transparent);
        }

        .tab-strip-wrapper::after {
            right: 32px;
            background: linear-gradient(to left, var(--bg0), transparent);
        }

        .tab-strip-wrapper.fade-left::before {
            opacity: 1;
        }

        .tab-strip-wrapper.fade-right::after {
            opacity: 1;
        }

        .tab-strip {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        .tab-strip::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 4px;
            padding: 0 8px;
            background: var(--bg2);
            border: 1px solid var(--bd);
            color: var(--tx2);
            border-radius: var(--radius-md);
            cursor: pointer;
            flex: 1 1 110px;
            min-width: 100px;
            max-width: 160px;
            transition: background .15s, color .15s, border-color .15s, flex-basis .15s, max-width .15s;
            margin-left: 2px;
            height: 38px;
            overflow: hidden;
            text-align: left;
        }

        @keyframes tab-open {
            from {
                opacity: 0;
                transform: scaleX(0.6) scaleY(0.85);
                max-width: 0;
                flex-basis: 0;
                margin-left: 0;
            }

            to {
                opacity: 1;
                transform: scaleX(1) scaleY(1);
                max-width: 160px;
                flex-basis: 110px;
                margin-left: 2px;
            }
        }

        @keyframes tab-close {
            from {
                opacity: 1;
                transform: scaleX(1) scaleY(1);
                max-width: 160px;
                flex-basis: 110px;
                margin-left: 2px;
            }

            to {
                opacity: 0;
                transform: scaleX(0.6) scaleY(0.85);
                max-width: 0;
                flex-basis: 0;
                margin-left: 0;
            }
        }

        .tab.tab-entering {
            animation: tab-open 0.14s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
            transform-origin: left center;
        }

        .tab.tab-leaving {
            animation: tab-close 0.10s ease-in forwards;
            transform-origin: left center;
            pointer-events: none;
        }

        .tab.active {
            background: var(--bg1);
            border-color: var(--ac);
            color: var(--tx);
            box-shadow: var(--shadow-sm)
        }

        .tab:hover:not(.active) {
            background: var(--surface2);
            color: var(--tx);
            border-color: var(--bd2)
        }

        .tab-icon {
            font-size: 14px;
            color: var(--ac);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-right: 3px;
        }

        .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            line-height: var(--ui-lh, 1.5);
            margin-right: 1px;
        }

        .tab-close {
            border: none;
            background: transparent;
            color: var(--tx3);
            cursor: pointer;
            width: 20px;
            min-width: 20px;
            height: 20px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            margin-right: -3px;
            flex-shrink: 0;
            transition: background .12s, color .12s;
        }

        .tab-close:hover {
            background: var(--surface2);
            color: var(--err)
        }

        .tab-mute-icon {
            color: var(--ac);
            font-size: 11px;
            flex-shrink: 0;
            display: none;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            margin-right: 1px;
            cursor: pointer;
            border-radius: 3px;
            transition: background .1s;
        }

        .tab-mute-icon:hover {
            background: rgba(157, 229, 255, .15);
        }

        .tab.muted .tab-mute-icon,
        .tab.audio-playing .tab-mute-icon {
            display: flex;
        }

        /* Tab right-click context menu */
        /* ── Drag-to-reorder tabs ── */
        .tab.tab-dragging {
            opacity: 0;
            pointer-events: none;
            flex: 0 0 0 !important;
            min-width: 0 !important;
            max-width: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            border: none !important;
        }

        /* The slot that opens up to show where the tab will land */
        .tab-drag-slot {
            flex: 0 0 var(--slot-w, 120px);
            min-width: var(--slot-w, 120px);
            max-width: var(--slot-w, 120px);
            width: var(--slot-w, 120px);
            height: 38px;
            border-radius: var(--radius-md);
            background: var(--surface);
            border: 1.5px dashed var(--bd2);
            pointer-events: none;
            flex-shrink: 0;
        }

        /* .tab-drag-slot.slot-open { already full width — no animation needed since tabs are frozen } */

        /* Floating ghost that follows the cursor */
        .tab-drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 100000;
            background: var(--bg1);
            border: 1.5px solid var(--ac);
            border-radius: var(--radius-md);
            color: var(--tx);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            height: 38px;
            font-size: 13px;
            font-family: var(--ui);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
            white-space: nowrap;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.94);
            transition: opacity 0.15s ease, transform 0.15s ease;
            will-change: left, top;
        }

        .tab-drag-ghost.ghost-visible {
            opacity: 1;
            transform: scale(1.03);
        }

        @keyframes tab-drop-settle {
            0% {
                transform: scale(1.06);
            }

            55% {
                transform: scale(0.97);
            }

            100% {
                transform: scale(1);
            }
        }

        .tab.tab-drop-settle {
            animation: tab-drop-settle 0.25s cubic-bezier(.2, .9, .4, 1.1) forwards;
        }

        .tab-context-menu {
            position: fixed;
            z-index: 99999;
            background: var(--bg2);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 6px;
            min-width: 170px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            transform-origin: top left;
        }

        .tab-context-menu.active {
            display: flex;
            animation: ctx-bounce .22s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes ctx-bounce {
            from {
                opacity: 0;
                transform: scale(.85) translateY(-6px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes ctx-bounce-out {
            from {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            to {
                opacity: 0;
                transform: scale(.88) translateY(-5px);
            }
        }

        .tab-context-menu.closing,
        .context-menu.closing {
            animation: ctx-bounce-out .14s ease-in both;
            pointer-events: none;
        }

        .nt-engine-dropdown.closing {
            animation: ctx-bounce-out .14s ease-in both;
            pointer-events: none;
        }

        .tab-ctx-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--tx);
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            text-align: left;
            transition: background .12s;
        }

        .tab-ctx-item:hover {
            background: var(--surface2);
        }

        .tab-ctx-item i {
            font-size: 13px;
            width: 16px;
            text-align: center;
            color: var(--tx2);
        }

        .tab-ctx-item.danger {
            color: var(--err);
        }

        .tab-ctx-item.danger i {
            color: var(--err);
        }

        .tab-ctx-item:disabled,
        .tab-ctx-item.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: all;
        }

        .tab-ctx-item:disabled:hover,
        .tab-ctx-item.disabled:hover {
            background: transparent;
        }

        .tab-ctx-separator {
            height: 1px;
            background: var(--bd);
            margin: 4px 0;
        }

        .tab-add {
            width: 38px;
            min-width: 38px;
            max-width: 38px;
            flex-shrink: 0;
            flex-grow: 0;
            height: 38px;
            border-radius: 10px;
            border: 2px dashed var(--bd);
            background: transparent;
            color: var(--tx2);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all .15s;
            margin-left: 2px;
            font-size: 18px;
            flex-shrink: 0;
        }

        .tab-add:hover {
            border-color: var(--ac);
            color: var(--ac);
            background: var(--surface)
        }

        .navbar {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 7px 12px;
            background: var(--bg1);
            border-bottom: 1px solid var(--bd);
        }

        .nav-pill-group {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
            gap: 1px;
        }

        .nav-pill-btn {
            border-radius: 7px !important;
            width: 32px !important;
            height: 32px !important;
        }

        .nav-pill-btn:hover:not(:disabled) {
            background: var(--surface2) !important;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--tx2);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: background .12s, color .12s;
            font-size: 16px;
        }

        .nav-btn i,
        .nav-pill-btn i {
            display: inline-block;
            transition: transform .22s cubic-bezier(.34, 1.56, .64, 1);
            will-change: transform;
        }

        /* back — slide left */
        #back:hover:not(:disabled) i {
            transform: translateX(-3px);
        }

        /* forward — slide right */
        #fwd:hover:not(:disabled) i {
            transform: translateX(3px);
        }

        /* reload — spin */
        #reload:hover:not(:disabled) i {
            transform: rotate(180deg);
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
        }

        /* stop — pulse shrink */
        #stop:hover:not(:disabled) i {
            transform: scale(.78);
            transition: transform .18s ease;
        }

        /* home — bob up */
        #home:hover:not(:disabled) i {
            transform: translateY(-3px);
        }

        /* history/clock — spin quarter */
        #historyBtn:hover:not(:disabled) i {
            transform: rotate(-45deg);
            transition: transform .28s cubic-bezier(.34, 1.56, .64, 1);
        }

        /* fullscreen — expand outward */
        #fullscreenBtn:hover:not(:disabled) i {
            transform: scale(1.22);
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--surface2);
            color: var(--tx)
        }

        .nav-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        .nav-btn:disabled i,
        .nav-btn:disabled:hover i {
            transition: none !important;
            transform: none !important;
        }

        .nav-btn.hidden {
            display: none;
        }

        .omnibox {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--bg3);
            padding: 0 8px 0 12px;
            min-width: 0;
            border: 1px solid transparent;
            transition: border-color .15s, box-shadow .2s, background .15s;
        }

        .omnibox:focus-within {
            border-color: var(--ac);
        }

        /* ── Drag-over omnibox state ── */
        @keyframes url-strike {
            0% {
                text-decoration-color: transparent;
                opacity: 1;
            }

            40% {
                text-decoration-color: var(--ac);
                opacity: 1;
            }

            100% {
                text-decoration-color: var(--ac);
                opacity: 0.38;
            }
        }

        @keyframes drop-ghost-slide {
            from {
                opacity: 0;
                transform: translateX(-6px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .omnibox.drag-over {
            border-color: var(--ac) !important;
            background: rgba(157, 229, 255, 0.07) !important;
            cursor: copy !important;
        }

        .omnibox.drag-over .url-input {
            animation: url-strike 0.22s ease forwards;
            text-decoration: line-through;
            text-decoration-color: var(--ac);
            text-decoration-thickness: 2px;
            color: var(--tx3);
            cursor: copy !important;
        }

        /* Inline "→ drop to navigate" ghost hint that appears in the omnibox */
        .omnibox .omni-drop-hint {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-family: var(--mono);
            color: var(--ac);
            white-space: nowrap;
            pointer-events: none;
            flex-shrink: 0;
            animation: drop-ghost-slide 0.18s ease both;
        }

        .omnibox.drag-over .omni-drop-hint {
            display: flex;
        }

        .omni-drop-hint i {
            font-size: 11px;
        }

        .find-bar {
            position: fixed;
            top: calc(127px + var(--bookmarks-height, 0px));
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            width: min(368px, calc(100vw - 24px));
            padding: 12px 12px 11px;
            background: var(--bg2);
            border: 1px solid var(--bd);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);

            /* Transitions for opening, closing, and moving */
            transition: top 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                right 0.12s ease-out,
                transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.22s ease,
                visibility 0.22s ease;
            opacity: 1;
            transform: scale(1) translateY(0);
            visibility: visible;
        }

        .find-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width:
